services:
  - type: web
    name: rylo-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false        # set manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false        # set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false        # set to https://your-app.vercel.app after Vercel deploy
      - key: DEMO_MODE
        value: "false"
